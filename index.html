<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📍 Real Push Location Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #f8f9fa; }
    button { padding: 15px 30px; font-size: 18px; margin: 15px; border: none; border-radius: 8px; cursor: pointer; }
    .btn1 { background: #007bff; color: white; }
    .btn2 { background: #28a745; color: white; }
    #status { margin: 30px; font-size: 17px; line-height: 1.6; min-height: 120px; }
  </style>
</head>
<body>
  <h1>📍 Real Push Location Tracker</h1>
  <p>GitHub Pages + Pipedream (No Firebase)</p>

  <button class="btn1" onclick="subscribeToPush()">1. Subscribe to Push Notifications</button><br><br>
  <button class="btn2" onclick="sendLocationUpdate()">2. Send My Current Location via Push</button>

  <div id="status"></div>

  <script>
    const VAPID_PUBLIC_KEY = "BPY-cv6ctLkUlqV6DMQPt0hS1lacj_7BAMnDleldwnmv7MqnyY73xhWlL_U_mSwzfU-mFvDE1Ivlrggbp7qIxKs";

    let subscription = null;

    async function subscribeToPush() {
      const status = document.getElementById('status');
      status.textContent = "Requesting permission...";

      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
          throw new Error("Your browser does not support push notifications");
        }

        const registration = await navigator.serviceWorker.register('/sw.js');

        const permission = await Notification.requestPermission();
        if (permission !== "granted") throw new Error("Notification permission denied. Please allow it.");

        subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: VAPID_PUBLIC_KEY
        });

        status.textContent = "✅ Successfully subscribed to push notifications!\n\nYou can now close the tab and still receive notifications.\nClick Button 2 to test.";
        console.log("Subscription:", subscription);
      } catch (err) {
        console.error(err);
        status.textContent = "❌ Error: " + err.message + "\n\nMake sure you allowed both Notification and Location permissions.";
      }
    }

    async function sendLocationUpdate() {
      const status = document.getElementById('status');
      if (!subscription) {
        status.textContent = "Please click Button 1 first!";
        return;
      }

      status.textContent = "📍 Getting your current location...";

      try {
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true });
        });

        const data = {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude,
          accuracy: position.coords.accuracy,
          timestamp: new Date().toISOString(),
          subscription: subscription
        };

        const response = await fetch('https://eos42ihp3bqk71v.m.pipedream.net', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          status.textContent = "✅ Location sent to Pipedream!\n\nWait a few seconds... You should receive a real push notification with your location.";
        } else {
          status.textContent = "❌ Failed to send to Pipedream";
        }
      } catch (err) {
        status.textContent = "❌ Error getting location: " + err.message;
      }
    }
  </script>
</body>
</html>
