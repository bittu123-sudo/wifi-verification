<!DOCTYPE html>
<html>
<head>
  <title>GPS Tracker PWA</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff88">
  <meta http-equiv="Permissions-Policy" content="geolocation=(self)">
  <style>
    body { margin: 0; background: #000; color: #0f0; font-family: monospace; }
    #status { position: fixed; top: 10px; left: 10px; background: rgba(0,255,0,0.1); padding: 10px; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>

<script>
// 👈 YOUR NEW URL
const PIPEDREAM_URL = 'https://eoqxdcdf7wad4id.m.pipedream.net';
let startTime = Date.now();
let locations_total = 0;
let lastSent = 0;

// AUTO-START ON LOAD
window.addEventListener('load', async () => {
  console.log('🚀 GPS AUTO-START');
  document.getElementById('status').textContent = '🔄 Starting GPS...';
  await startTracking();
});

async function startTracking() {
  // Initial GPS
  await sendGPS();
  
  // 60s loop
  setInterval(sendGPS, 60000);
  console.log('⏰ 60s loop started');
}

async function sendGPS() {
  if (Date.now() - lastSent < 55000) return;
  
  try {
    const pos = await new Promise((res, rej) => {
      navigator.geolocation.getCurrentPosition(res, rej, {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 30000
      });
    });
    
    await sendToPipedream(pos);
    locations_total++;
    document.getElementById('status').textContent = `✅ #${locations_total} sent`;
    
  } catch(e) {
    console.error('GPS:', e);
  }
}

async function sendToPipedream(pos) {
  const battery = await (navigator.getBattery?.()?.then(b => Math.round(b.level * 100)) ?? 0);
  const uptime = Math.floor((Date.now() - startTime) / 60000);
  
  const payload = {
    latitude: pos.coords.latitude,
    longitude: pos.coords.longitude,
    accuracy: pos.coords.accuracy,
    battery: battery,
    uptime_minutes: uptime,
    locations_total: locations_total
  };
  
  console.log('📤', payload);
  
  const res = await fetch(PIPEDREAM_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  
  console.log('📥', res.status);
  lastSent = Date.now();
}
</script>
</body>
</html>
