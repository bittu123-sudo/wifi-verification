<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee GPS Tracker</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>Employee GPS Tracking</h2>

<p>Enter your Employee ID and press Start</p>

<input id="empid" placeholder="Employee ID">

<br><br>

<button onclick="startTracking()">Start Tracking</button>

<p id="status"></p>

<script>

function startTracking(){

let emp=document.getElementById("empid").value;

if(emp==""){
alert("Enter Employee ID");
return;
}

document.getElementById("status").innerHTML="Tracking started...";

navigator.geolocation.watchPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

fetch("https://eowi5n8vlh9h3xy.m.pipedream.net",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
employee:emp,
latitude:lat,
longitude:lon,
time:new Date().toISOString(),
useragent:navigator.userAgent
})
});

console.log("Location sent:",lat,lon);

});

}

</script>

</body>
</html>
