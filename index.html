<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Share Location</title>
<style>
body{
 font-family:Arial,sans-serif;
 text-align:center;
 padding:40px;
}
button{
 padding:15px 25px;
 font-size:18px;
 border:none;
 border-radius:10px;
 cursor:pointer;
}
#msg{margin-top:20px;}
</style>
</head>
<body>

<h2>Location Share</h2>
<p>Tap below to share your location.</p>
<button onclick="sendLoc()">Share Location</button>
<div id="msg"></div>

<script>
async function sendLoc(){
 const msg=document.getElementById("msg");
 msg.innerText="Requesting permission...";

 if(!navigator.geolocation){
   msg.innerText="Geolocation not supported.";
   return;
 }

 navigator.geolocation.getCurrentPosition(async(pos)=>{
   const data={
     latitude: pos.coords.latitude,
     longitude: pos.coords.longitude,
     accuracy: pos.coords.accuracy,
     time: new Date().toISOString()
   };

   await fetch("PASTE_YOUR_PIPEDREAM_WEBHOOK_HERE",{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body: JSON.stringify(data)
   });

   msg.innerText="Location sent successfully.";
 },()=>{
   msg.innerText="Permission denied.";
 },{
   enableHighAccuracy:true,
   timeout:10000
 });
}
</script>

</body>
</html>
