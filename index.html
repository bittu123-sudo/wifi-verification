<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>GPS Tracker Debug - Android</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:20px}
h1{color:#00d4ff;margin-bottom:20px}
.status-box{background:#16213e;padding:20px;border-radius:10px;margin-bottom:20px}
button{background:#e94560;color:white;border:none;padding:15px 30px;font-size:16px;border-radius:5px;cursor:pointer;width:100%;margin-bottom:10px}
button.active{background:#00b894}
.info{font-size:14px;line-height:1.6;margin-top:10px}
.log{background:#000;color:#0f0;padding:15px;border-radius:5px;font-family:monospace;font-size:12px;max-height:200px;overflow-y:scroll;margin-top:15px}
.coords{background:#0f3460;padding:15px;border-radius:5px;margin-top:15px;font-family:monospace}
.error{background:#e94560;padding:10px;border-radius:5px;margin-top:10px;display:none}
small{opacity:0.6}
</style>
</head>
<body>
<h1>📍 GPS Tracker - Android Debug</h1>

<div class="status-box">
  <button id="startBtn" onclick="initTracker()">▶ START TRACKING</button>
  <div class="info">
    <div>Status: <span id="status">Idle</span></div>
    <div>Updates: <span id="count">0</span></div>
    <div>Last: <span id="lastUpdate">Never</span></div>
    <div>Next: <span id="nextUpdate">--</span></div>
  </div>
</div>

<div class="status-box">
  <h3>📍 GPS Coordinates</h3>
  <div class="coords" id="coords">Waiting for first fix...</div>
  <div id="error" class="error"></div>
</div>

<div class="status-box">
  <h3>📋 Debug Log</h3>
  <div class="log" id="log">[System] Ready. Click START to begin tracking.</div>
</div>

<script>
const WEBHOOK = "https://eowi5n8vlh9h3xy.m.pipedream.net";
let isTracking = false;
let updateCount = 0;
let lastGPSFix = null;

// Logging function
function log(msg) {
  const logEl = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  logEl.innerHTML = `[${time}] ${msg}<br>` + logEl.innerHTML;
  console.log(`[GPS-TRACKER] ${msg}`);
}

// Initialize tracker
async function initTracker() {
  const btn = document.getElementById('startBtn');
  const statusEl = document.getElementById('status');
  
  if (isTracking) {
    // Stop tracking
    isTracking = false;
    btn.textContent = '▶ START TRACKING';
    btn.classList.remove('active');
    statusEl.textContent = 'Stopped';
    log('🛑 Tracking stopped by user');
    return;
  }
  
  // Start tracking
  isTracking = true;
  btn.textContent = '⏹ STOP TRACKING';
  btn.classList.add('active');
  statusEl.textContent = 'Starting...';
  
  log('🚀 Starting GPS tracking...');
  
  // Request permission (Android specific)
  try {
    const permission = await navigator.permissions.query({ name: 'geolocation' });
    log(`📝 Permission status: ${permission.state}`);
    
    if (permission.state === 'denied') {
      showError('GPS permission denied. Go to Chrome settings → Site settings → Location');
      return;
    }
  } catch (e) {
    log(`⚠️ Permission query failed: ${e.message}`);
  }
  
  // Start GPS updates
  statusEl.textContent = 'GPS Active';
  startGPSTracking();
}

function showError(msg) {
  const errEl = document.getElementById('error');
  errEl.textContent = msg;
  errEl.style.display = 'block';
  log(`❌ ERROR: ${msg}`);
}

function startGPSTracking() {
  log('📡 Starting GPS polling (every 10 seconds)...');
  
  // STRATEGY 1: Direct polling every 10 seconds
  setInterval(() => {
    if (!isTracking) return;
    
    log('📡 Requesting GPS fix...');
    getCurrentPosition();
  }, 10000);
  
  // STRATEGY 2: Immediate first fix
  getCurrentPosition();
}

function getCurrentPosition() {
  const options = {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 0
  };
  
  navigator.geolocation.getCurrentPosition(
    (position) => {
      updateCount++;
      lastGPSFix = position;
      
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const acc = position.coords.accuracy;
      const time = new Date().toLocaleTimeString();
      
      // Update UI
      document.getElementById('count').textContent = updateCount;
      document.getElementById('lastUpdate').textContent = time;
      
      // Calculate next update (10s from now)
      const nextTime = new Date(Date.now() + 10000);
      document.getElementById('nextUpdate').textContent = nextTime.toLocaleTimeString();
      
      // Show coordinates
      const mapsLink = `https://maps.google.com/maps?q=${lat},${lon}`;
      document.getElementById('coords').innerHTML = `
        <strong>Latitude:</strong> ${lat.toFixed(6)}<br>
        <strong>Longitude:</strong> ${lon.toFixed(6)}<br>
        <strong>Accuracy:</strong> ${acc.toFixed(0)} meters<br>
        <strong>Time:</strong> ${time}<br>
        <br>
        <a href="${mapsLink}" target="_blank" style="color:#00d4ff">🔗 Open in Google Maps</a>
      `;
      
      // Send to Pipedream
      const data = {
        type: 'android_30s',
        latitude: lat,
        longitude: lon,
        accuracy: acc,
        timestamp: new Date().toISOString(),
        count: updateCount,
        maps: mapsLink,
        device: 'android_chrome_debug'
      };
      
      fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(response => {
        log(`📤 Sent to Pipedream (HTTP ${response.status})`);
        document.getElementById('status').textContent = `GPS Active (#${updateCount})`;
      })
      .catch(error => {
        log(`📤 Send failed: ${error.message}`);
      });
      
      log(`✅ GPS Fix #${updateCount}: ${lat.toFixed(4)}, ${lon.toFixed(4)}`);
    },
    (error) => {
      let errorMsg = '';
      switch(error.code) {
        case error.PERMISSION_DENIED:
          errorMsg = 'GPS permission denied';
          break;
        case error.POSITION_UNAVAILABLE:
          errorMsg = 'GPS position unavailable';
          break;
        case error.TIMEOUT:
          errorMsg = 'GPS request timed out';
          break;
        default:
          errorMsg = error.message;
      }
      log(`❌ GPS Error: ${errorMsg}`);
      showError(errorMsg);
    },
    options
  );
}

// Handle page visibility (Android specific)
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    log('📱 Tab in background');
  } else {
    log('📱 Tab in foreground - refreshing GPS');
    if (isTracking) getCurrentPosition();
  }
});

// Auto-start on load (optional - remove if you want manual start)
// window.addEventListener('load', initTracker);
</script>
</body>
</html>
