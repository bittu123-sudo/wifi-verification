<!DOCTYPE html>
<html>
<head>
<title>GPS TEST</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<style>body{font-family:monospace;background:#000;color:#0f0;padding:20px;text-align:center;}
#log{padding:20px;background:#111;border-radius:10px;margin:20px 0;max-height:400px;overflow:auto;}</style>
</head>
<body>
<h1>🧪 GPS TEST (SIMPLE)</h1>
<div id="status">Click START</div>
<div id="log"></div>
<button onclick="testGPS()" style="padding:20px;font-size:18px;">🚀 TEST GPS NOW</button>
<button onclick="startLoop()" style="padding:20px;font-size:18px;background:#f90;">🔄 START 60s LOOP</button>

<script>
const URL = 'https://eoqxdcdf7wad4id.m.pipedream.net';
let count = 0;

function log(msg) {
  document.getElementById('log').innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
  document.getElementById('log').scrollTop = 99999;
}

async function testGPS() {
  log('🔄 Getting GPS...');
  try {
    const pos = await new Promise((r,j) => navigator.geolocation.getCurrentPosition(r,j));
    log(`✅ GPS: ${pos.coords.latitude}, ${pos.coords.longitude}`);
    
    const data = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      acc: pos.coords.accuracy
    };
    
    const res = await fetch(URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    
    log(`📤 Pipedream: ${res.status} OK!`);
    
  } catch(e) {
    log(`❌ ERROR: ${e.message}`);
  }
}

async function startLoop() {
  testGPS();
  setInterval(testGPS, 60000);
  log('⏰ 60s LOOP STARTED');
}
</script>
</body>
</html>
