<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📍 Real Push Location Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #f8f9fa; }
    button { padding: 15px 30px; font-size: 18px; margin: 15px; border: none; border-radius: 8px; cursor: pointer; }
    .btn1 { background: #007bff; color: white; }
    .btn2 { background: #28a745; color: white; }
    #status { margin: 30px; font-size: 17px; line-height: 1.6; min-height: 150px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>📍 Real Push Location Tracker</h1>

  <button class="btn1" onclick="subscribeToPush()">1. Subscribe to Push Notifications</button><br><br>
  <button class="btn2" onclick="sendLocationUpdate()">2. Send My Current Location via Push</button>

  <div id="status"></div>

  <script>
    const VAPID_PUBLIC_KEY = "BPY-cv6ctLkUlqV6DMQPt0hS1lacj_7BAMnDleldwnmv7MqnyY73xhWlL_U_mSwzfU-mFvDE1Ivlrggbp7qIxKs";
    let subscription = null;

    async function subscribeToPush() {
      const status = document.getElementById('status');
      status.textContent = "Requesting permission...\n";

      try {
        const registration = await navigator.serviceWorker.register('/sw.js');
        console.log("✅ Service Worker registered");

        const permission = await Notification.requestPermission();
        if (permission !== "granted") throw new Error("Notification permission denied");

        subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: VAPID_PUBLIC_KEY
        });

        console.log("✅ Subscription created:", subscription);
        status.textContent = "✅ Subscription successful!\n\nNow click Button 2.\n\nSubscription ID: " + subscription.endpoint.substring(0, 60) + "...";
      } catch (err) {
        console.error(err);
        status.textContent = "❌ Subscribe failed: " + err.message;
      }
    }

    async function sendLocationUpdate() {
      const status = document.getElementById('status');
      if (!subscription) {
        status.textContent = "❌ Please complete Button 1 first (Subscribe)";
        return;
      }

      status.textContent = "📍 Getting location...\n";

      try {
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
        });

        const payload = {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude,
          accuracy: position.coords.accuracy,
          timestamp: new Date().toISOString(),
          subscription: subscription   // Full subscription object
        };

        console.log("Sending payload with subscription:", !!payload.subscription);

        const response = await fetch('https://eos42ihp3bqk71v.m.pipedream.net', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          status.textContent += "✅ Sent to Pipedream successfully!\nWaiting for push notification...";
        } else {
          status.textContent += "❌ HTTP error: " + response.status;
        }
      } catch (err) {
        status.textContent += "❌ Location error: " + err.message;
      }
    }
  </script>
</body>
</html>
