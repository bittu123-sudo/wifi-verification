<!DOCTYPE html>
<html>
<head>
  <title>GPS Tracker</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff88">
  <style>
    body{background:#000;color:#0f0;font-family:monospace;font-size:14px;}
    #status{position:fixed;top:10px;left:10px;background:rgba(0,255,0,0.2);padding:15px;border-radius:8px;}
    #coords{padding:10px;background:#111;margin:10px;border-radius:5px;}
    button{display:block;margin:20px auto;padding:15px 30px;background:#0f0;color:#000;border:none;border-radius:25px;font-weight:bold;cursor:pointer;}
    button:hover{background:#0a0;}
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="coords"></div>
  <button onclick="startTracking()">🔄 START TRACKING</button>

<script>
const PIPEDREAM_URL = 'https://eoqxdcdf7wad4id.m.pipedream.net';  // YOUR URL
let wakeLock = null;
let intervalId = null;
let locations_total = parseInt(localStorage.getItem('gps_count') || '0');  // 👈 SURVIVES CLEAR!

// WAKELOCK (BACKGROUND)
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log('🔓 Background ACTIVE');
  }
}

// PERSISTENT GPS SEND
async function sendGPS() {
  try {
    document.getElementById('status').textContent = '📍 Getting GPS...';
    
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 8000,
        maximumAge: 60000  // Cache 1min
      });
    });
    
    // Update display
    document.getElementById('coords').innerHTML = `
      📍 ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}<br>
      🎯 ${pos.coords.accuracy.toFixed(0)}m<br>
      #${++locations_total}
    `;
    
    // Send to Pipedream
    await sendToPipedream(pos);
    localStorage.setItem('gps_count', locations_total);  // 👈 PERSISTENT COUNTER
    
    document.getElementById('status').textContent = `✅ GPS #${locations_total} SENT`;
    
  } catch(err) {
    document.getElementById('status').textContent = `❌ ${err.message}`;
    console.error(err);
  }
}

async function sendToPipedream(pos) {
  const battery = navigator.getBattery ? 
    await (await navigator.getBattery()).level * 100 : 0;
  const uptime = Math.floor((Date.now() - (localStorage.getItem('start_time') || Date.now())) / 60000);
  
  const payload = {
    latitude: pos.coords.latitude,
    longitude: pos.coords.longitude,
    accuracy: pos.coords.accuracy,
    battery: Math.round(battery),
    uptime_minutes: uptime,
    locations_total: locations_total
  };
  
  const res = await fetch(PIPEDREAM_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),
    keepalive: true
  });
  
  console.log('Pipedream:', res.status, payload);
}

function startTracking() {
  requestWakeLock();
  sendGPS();  // Initial
  intervalId = setInterval(sendGPS, 60000);  // 1min
  document.querySelector('button').textContent = '✅ TRACKING LIVE';
}

// AUTO-START (page load)
if (Notification.permission === 'granted') {
  startTracking();
}
</script>
</body>
</html>
