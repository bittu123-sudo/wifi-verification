<script>
// PIPEDREAM
const PIPEDREAM_URL = 'https://eounbv7s4939vim.m.pipedream.net';
let startTime = Date.now();
let locations_total = 0;
let wakeLock = null;
let intervalId = null;
let lastSent = 0;

// 🔥 AUTO-START ON LOAD (No button needed!)
window.addEventListener('load', async () => {
  console.log('🚀 GPS TRACKER LOADED - AUTO-STARTING...');
  document.getElementById('status').textContent = '🔄 Requesting GPS...';
  
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
  
  // AUTO GPS + 1min loop
  await requestPermissions();
  await startTracking();
});

// Permissions + WakeLock
async function requestPermissions() {
  try {
    // WakeLock
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('🔓 WakeLock ACTIVE');
    }
    
    // GPS permission (auto-request)
    await new Promise(resolve => {
      navigator.geolocation.getCurrentPosition(resolve, resolve, {
        enableHighAccuracy: true,
        timeout: 5000
      });
    });
    console.log('✅ GPS Permission OK');
  } catch(e) {
    console.log('⚠️ Permissions warning:', e.message);
  }
}

// MAIN TRACKING LOOP
async function startTracking() {
  console.log('⏰ Starting 60s GPS loop...');
  document.getElementById('status').textContent = '🔄 Live Tracking (60s intervals)';
  
  // Initial GPS
  await sendGPS();
  
  // Every 60 seconds FOREVER
  intervalId = setInterval(sendGPS, 60000);
}

// SINGLE GPS SEND (with retry)
async function sendGPS() {
  const now = Date.now();
  if (now - lastSent < 55000) return; // Prevent spam
  
  try {
    document.getElementById('status').textContent = '📍 Getting GPS...';
    
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 30000
      });
    });
    
    await sendToPipedream(pos);
    lastSent = now;
    locations_total++;
    
    document.getElementById('status').textContent = 
      `✅ GPS #${locations_total} sent (${new Date().toLocaleTimeString()})`;
    console.log('✅ SENT:', pos.coords.latitude, pos.coords.longitude);
    
  } catch(err) {
    console.error('GPS ERROR:', err.message);
    document.getElementById('status').textContent = `❌ GPS failed: ${err.message}`;
  }
}

// PIPEDREAM POST
async function sendToPipedream(pos) {
  const battery = await (navigator.getBattery?.()?.then(b => b.level * 100) ?? Promise.resolve(0));
  const uptime = Math.floor((Date.now() - startTime) / 60000);
  
  const payload = {
    latitude: pos.coords.latitude,
    longitude: pos.coords.longitude,
    accuracy: pos.coords.accuracy,
    altitude: pos.coords.altitude ?? null,
    speed: pos.coords.speed ?? null,
    battery: Math.round(await battery),
    locations_total: locations_total,
    uptime_minutes: uptime,
    timestamp: new Date().toISOString()
  };
  
  console.log('📤 POSTING:', payload);
  
  const response = await fetch(PIPEDREAM_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    keepalive: true
  });
  
  if (!response.ok) {
    throw new Error(`HTTP ${response.status}`);
  }
  
  console.log('📥 Pipedream OK:', response.status);
}
</script>
